<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan</title>
    <!-- Menggunakan Tailwind CSS via CDN untuk styling cepat -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menggunakan Chart.js untuk menggambar grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6 md:p-10">
    <!-- Overlay Loading / Memeriksa Sesi Login -->
    <div id="auth-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <p class="text-xl font-bold animate-pulse text-gray-500">Memeriksa Sesi...</p>
    </div>

    <!-- Konten Utama (Disembunyikan sampai sesi login divalidasi) -->
    <div class="max-w-[1400px] mx-auto space-y-8" id="main-content" style="display: none;">
        
        <!-- Bagian Header (Salam & Tombol Logout) -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800">Halo, Admin!</h1>
                <p class="text-gray-500">Berikut adalah ringkasan keuangan Anda.</p>
            </div>
            <button id="btn-logout" class="bg-red-100 text-red-600 font-semibold py-2 px-6 rounded-full hover:bg-red-200 transition">Logout</button>
        </header>

        <!-- Bagian Ringkasan Saldo (3 Kotak Atas) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium mb-2">Pemasukan</h3>
                <p class="text-4xl font-extrabold text-slate-800" id="dash-pemasukan">Rp 0</p>
            </div>
            <div class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 text-sm font-medium mb-2">Pengeluaran</h3>
                <p class="text-4xl font-extrabold text-slate-800" id="dash-pengeluaran">Rp 0</p>
            </div>
            <div class="bg-slate-800 p-7 rounded-3xl shadow-sm text-white">
                <h3 class="text-gray-300 text-sm font-medium mb-2">Total Saldo</h3>
                <p class="text-4xl font-extrabold" id="dash-saldo">Rp 0</p>
            </div>
        </div>

        <!-- Bagian Konten Bawah (Grafik, Tabel, Form) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Kolom Kiri & Tengah (Lebih Lebar) -->
            <div class="lg:col-span-2 space-y-8">
                
                <!-- KARTU 1: GRAFIK (Ini bagian yang baru kita ubah!) -->
                <div class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800">Analisis Aliran Keuangan</h2>
                        <!-- Filter Dinamis untuk Grafik -->
                        <select id="filter-chart" class="bg-gray-50 border border-gray-200 text-sm rounded-full px-4 py-2 focus:outline-none cursor-pointer">
                            <option value="bulanan">Bulanan (Tahun Ini)</option>
                            <option value="mingguan">Mingguan (Bulan Ini)</option>
                            <option value="harian">Harian (7 Hari Terakhir)</option>
                        </select>
                    </div>
                    <!-- Area untuk menggambar Chart.js -->
                    <div class="h-[300px] w-full"><canvas id="aliranChart"></canvas></div>
                </div>

                <!-- KARTU 2: TABEL LOG TRANSAKSI -->
                <div class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800">Log Transaksi</h2>
                        <!-- Filter Dinamis untuk Tabel SQL -->
                        <select id="filter-tabel" class="bg-gray-50 border border-gray-200 text-sm rounded-full px-4 py-2 focus:outline-none cursor-pointer">
                            <option value="semua">Semua Waktu</option>
                            <option value="harian">Harian</option>
                            <option value="mingguan">Mingguan</option>
                            <option value="bulanan">Bulanan</option>
                        </select>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="border-b border-gray-100">
                                <tr>
                                    <th class="p-4 font-semibold text-gray-500">Tanggal</th>
                                    <th class="p-4 font-semibold text-gray-500">Keterangan</th>
                                    <th class="p-4 font-semibold text-gray-500">Kategori</th>
                                    <th class="p-4 font-semibold text-gray-500">Jumlah</th>
                                    <th class="p-4">Aksi</th> 
                                </tr>
                            </thead>
                            <tbody id="tabel-transaksi">
                                <!-- Data tabel akan disuntikkan dari app.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Kolom Kanan (Lebih Sempit) -->
            <div class="lg:col-span-1 space-y-8">
                
                <!-- KARTU 3: FORM TAMBAH/EDIT TRANSAKSI -->
                <div class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold text-slate-800 mb-6" id="form-title">Catat Transaksi</h2>
                    <form id="form-transaksi" class="space-y-4">
                        <!-- Input tersembunyi untuk menyimpan ID jika sedang mode Edit -->
                        <input type="hidden" id="edit-id">
                        
                        <div>
                            <select id="input-jenis" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:outline-none" required>
                                <option value="Pemasukan">Pemasukan (+)</option>
                                <option value="Pengeluaran">Pengeluaran (-)</option>
                            </select>
                        </div>
                        <div>
                            <input type="number" id="input-jumlah" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:outline-none" placeholder="Jumlah (Misal: 50000)" required>
                        </div>
                        <div>
                            <input type="text" id="input-keterangan" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:outline-none" placeholder="Keterangan transaksi" required>
                        </div>
                        <div>
                            <input type="date" id="input-tanggal" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:outline-none cursor-pointer" required>
                        </div>
                        
                        <!-- Tombol Aksi Form -->
                        <div class="flex gap-2">
                            <button type="submit" id="btn-simpan" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition">Simpan</button>
                            <button type="button" id="btn-batal" class="hidden w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-300 transition">Batal</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Menghubungkan ke logika JavaScript -->
    <script src="app.js"></script>
</body>
</html>
